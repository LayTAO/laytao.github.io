name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: "2.5.23"
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        env:
          RUBYOPT: "-r${{ github.workspace }}/local_tools/ruby_compat"
          JEKYLL_ENV: production
        run: bundle exec jekyll build --destination ./_site

      - name: Normalize artifact permissions
        run: find _site -type f -exec chmod 644 {} + && find _site -type d -exec chmod 755 {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: "2.5.23"
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        env:
          RUBYOPT: "-r${{ github.workspace }}/local_tools/ruby_compat"
          JEKYLL_ENV: production
        run: bundle exec jekyll build --destination ./_site

      - name: Normalize artifact permissions
        run: find _site -type f -exec chmod 644 {} + && find _site -type d -exec chmod 755 {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before deploy retry
        if: steps.deployment.outcome != 'success'
        run: sleep 90

      - name: Retry deploy to GitHub Pages
        if: steps.deployment.outcome != 'success'
        id: deployment_retry
        uses: actions/deploy-pages@v5

      - name: Fail if deployment did not succeed
        if: steps.deployment.outcome != 'success' && steps.deployment_retry.outcome != 'success'
        run: exit 1
